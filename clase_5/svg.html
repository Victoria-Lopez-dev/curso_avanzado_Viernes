<!-- svg 

    formas primitivas - formas geometricas
    rect - circle-ellipse-line-polyline-polygon

    atributos:
    x ->eje horizontal
    y -> eje vertical
    fill-> color de relleno
    stroke-> color de contorno
    stroke-width -> ancho del contorno
    cx -> punto eje x del centro de la circunferencia
    cy -> punto eje y del centro de la circunferencia
    r -> radio de la circuferencia
    rx -> radio eje x de la elipse 
    ry ->radio eje y de la elipse 
    x1,y1-> punto 
    x2,y2 -> punto
    points -> conjunto de pares x y separados con una coma que representan puntos continuos
-->
